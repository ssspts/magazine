<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IML - Movie & News Magazine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header>
    <div class="header-left">
        <img src="assets/iml.png" alt="IML Logo" class="logo">
        <h1>IML Magazine</h1>
    </div>
</header>

<!-- Main content -->
<main>
    <div class="magazine-container" id="magazineContainer">
        <!-- Desktop 2-page layout -->
        <div class="page page-left" id="leftPage">
            <div class="page-number" id="leftPageNumber"></div>
        </div>
        <div class="page page-right" id="rightPage">
            <div class="page-number" id="rightPageNumber"></div>
        </div>

        <!-- Mobile single-page layout -->
        <div class="page page-mobile" id="currentPage">
            <div class="page-number" id="currentPageNumber"></div>
        </div>
    </div>
</main>

<!-- Pagination -->
<div class="pagination">
    <button onclick="prev()">&#8592; Prev</button>
    <button onclick="next()">Next &#8594;</button>
</div>

<!-- Footer -->
<footer>
    &copy; 2026 IML Magazine
</footer>

<script src="script.js"></script>
</body>
</html>
